<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>学習ノート — エンジニアリング会話ナレッジ</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111821;
      --panel-2: #162231;
      --text: #eef4fb;
      --muted: #a8b6c8;
      --line: #2b3a4b;
      --accent: #58d6c2;
      --accent-2: #f2c94c;
      --info: #77aaff;
      --shadow: rgba(0, 0, 0, 0.35);
      --max: 980px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(88, 214, 194, 0.12), transparent 34rem),
        linear-gradient(180deg, #0b0f14 0%, #101721 46%, #0b0f14 100%);
      color: var(--text);
      font-family: "Yu Gothic UI", "Meiryo", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
      line-height: 1.75;
    }

    a { color: var(--accent); }

    header, main, footer {
      width: min(100% - 2rem, var(--max));
      margin: 0 auto;
    }

    .hero {
      padding: 4.5rem 0 2rem;
    }

    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.2;
    }

    .hero-summary {
      max-width: 720px;
      margin: 1.2rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.4rem;
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(17, 24, 33, 0.78);
      color: var(--accent);
      font-weight: 700;
      line-height: 1;
      padding: 0.7rem 1rem;
      text-decoration: none;
    }

    .hero-link:hover {
      border-color: var(--accent);
      text-decoration: underline;
    }

    .search-wrap {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 1.4rem 0 1.2rem;
      margin-top: 1.5rem;
      background: linear-gradient(180deg, rgba(11,15,20,0.96) 60%, rgba(11,15,20,0));
    }

    .search-box {
      width: 100%;
      min-height: 3.2rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 0.8rem 1rem;
    }

    .search-box:focus-visible {
      outline: 3px solid var(--accent-2);
      outline-offset: 2px;
      border-color: var(--accent);
    }

    .count {
      margin: 0.6rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .category-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.85rem;
    }

    .category-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(17, 24, 33, 0.78);
      color: var(--muted);
      font: inherit;
      font-size: 0.88rem;
      line-height: 1;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }

    .category-chip[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 2px rgba(88, 214, 194, 0.16);
    }

    .note-list {
      display: grid;
      gap: 1rem;
      margin: 0 0 3rem;
      padding: 0;
      list-style: none;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(22, 34, 49, 0.9), rgba(17, 24, 33, 0.9));
      box-shadow: 0 12px 30px var(--shadow);
      transition: border-color 160ms ease, transform 160ms ease;
    }

    .note-card:hover {
      border-color: rgba(88, 214, 194, 0.7);
      transform: translateY(-2px);
    }

    .note-card a.note-link {
      display: block;
      padding: 1.3rem 1.4rem;
      color: inherit;
      text-decoration: none;
    }

    .note-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .note-date {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .note-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 999px;
      padding: 0.18rem 0.65rem;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .category-badge {
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(17, 24, 33, 0.58);
    }

    .category-dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 999px;
      background: var(--accent);
    }

    .level-badge.level-intro {
      color: var(--accent);
      background: rgba(88, 214, 194, 0.15);
    }

    .level-badge.level-basic {
      color: var(--info);
      background: rgba(119, 170, 255, 0.15);
    }

    .level-badge.level-advanced {
      color: var(--accent-2);
      background: rgba(242, 201, 76, 0.15);
    }

    .note-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.3rem;
      line-height: 1.35;
      color: var(--text);
    }

    .note-card p {
      margin: 0 0 0.8rem;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      background: rgba(17, 24, 33, 0.78);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 12px;
    }

    footer {
      padding: 2.5rem 0 3.5rem;
      color: var(--muted);
      border-top: 1px solid rgba(168, 182, 200, 0.14);
      font-size: 0.9rem;
    }

    footer p { margin: 0.3rem 0; }
  </style>
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Engineering knowledge notes</p>
    <h1>学習ノート</h1>
    <p class="hero-summary">Claude Code や Codex との実装会話から、非エンジニアでも後から学べる形に整理したナレッジ集。気になるキーワードで検索して、開いて読むだけ。</p>
    <div class="hero-actions">
      <a class="hero-link" href="clips/index.html">📎 クリップフィード</a>
    </div>
  </header>

  <main>
    <div class="search-wrap">
      <input
        id="search"
        class="search-box"
        type="search"
        placeholder="キーワードで検索（例: ppam, VBA, 保存失敗, セキュリティ）"
        aria-label="ノートを検索"
        autocomplete="off">
      <div class="category-filter" id="category-filter" aria-label="カテゴリで絞り込み"></div>
      <p class="count" id="count"></p>
    </div>

    <ul class="note-list" id="list"></ul>
  </main>

  <footer>
    <p>非公開メモ（検索エンジン除外設定済み）。URLを知っている人だけが閲覧できます。</p>
    <p>最終更新: 2026-06-17</p>
  </footer>

  <script>
    // ノート一覧。新しい会話をナレッジ化したら、ここに1件追加する。
    var NOTES = [
      {
        title: "AI業務活用ショート動画：ネタ×フォーマット プレイブック（海外IG/X発・他ジャンル転用）",
        href: "notes/ig-ai-shortvideo-playbook.html",
        date: "2026-06-26",
        summary: "Instagramショート動画でAIの業務活用（＋便利な日常活用）を発信するための企画集。日本人未開拓の海外IG発ネタとXトレンド未動画化ネタを表で、料理/筋トレ/金融/お笑い/教育/Tipsの他ジャンル由来33フォーマットを、撮影/編集工数・優先度・タップ再生できる参考ショート動画つきカードで収録。AI発信者の定番型を避けて差別化する設計。",
        category: "ai",
        level: "応用",
        tags: ["Instagram","ショート動画","リール","SNS","コンテンツ企画","AI業務活用","フォーマット","ネタ","海外トレンド","TikTok","YouTube Shorts","動画編集","差別化"]
      },
      {
        title: "Claude Code徹底ガイド：Dynamic Workflow・モデル・工数（effort）の使い分け",
        href: "notes/claude-dynamic-workflow-effort.html",
        date: "2026-06-17",
        summary: "Opus 4.8を普段使いする人向けに、Dynamic Workflowで何ができるか、モデル(Opus/Sonnet/Haiku/Fable)の使い分け、工数(low〜max＋Ultracode)の選び方を、2026年6月時点のAnthropic一次情報をもとに整理。Ultracodeの正体と、普段使いの工数の振り方まで。",
        category: "ai",
        level: "応用",
        tags: ["Claude Code","Dynamic Workflow","サブエージェント","工数","effort","Ultracode","モデル選択","Opus 4.8","Fable 5","Sonnet 4.6","Haiku 4.5","xhigh","レート制限","opusplan"]
      },
      {
        title: "企業のAI導入：API従量課金 と サブスクの違い — なぜ「全員サブスク」で済まないのか",
        href: "notes/ai-api-vs-subscription.html",
        date: "2026-06-12",
        summary: "「全社員にサブスクを配ればいい」という感覚と、企業がAPIで1日数十万〜数百万円を使う現実のズレを解く。課金モデル(サブスク/API従量)とデータ経路(AI企業直接/AWS・Azure経由=Bedrock・Azure OpenAI)の2軸を分け、セキュリティ・データの流れ・信頼性の違いを非エンジニア目線で整理。",
        category: "ai",
        level: "基礎",
        tags: ["AI導入","API","従量課金","サブスクリプション","Amazon Bedrock","Azure OpenAI","セキュリティ","データレジデンシー","エンタープライズ","コスト","Claude Code","Codex","AIエージェント"]
      },
      {
        title: "非エンジニアのためのGitHub入門 — 公開・実行の仕組みを理解する",
        href: "notes/github-for-non-engineers.html",
        date: "2026-06-12",
        summary: "GitHubの基本構造（リポジトリ・コミット・履歴）から、ナレッジをWebサイトとして公開するGitHub Pagesの仕組み、そして公開コードをClaude Code/Codexが読み込んで動かす原理までを、非エンジニア目線で整理。",
        category: "dev",
        level: "入門",
        tags: ["GitHub", "GitHub Pages", "リポジトリ", "git clone", "静的サイト", "Claude Code", "Codex", "入門", "ファイル構成"]
      },
      {
        title: "PowerPointアドイン開発記 — 保存失敗の真因を切り分ける",
        href: "notes/powerpoint-addin.html",
        date: "2026-06-12",
        summary: "VBA + RibbonX で .ppam アドインを作る過程で、保存がE_FAILで失敗し続けた。真犯人は壊れた保存経路ではなく、PowerPointに存在しない型 As Window の1単語だった、というデバッグ叙事詩。",
        category: "office",
        level: "応用",
        tags: ["VBA", "RibbonX", "PowerPoint", "ppam", "E_FAIL", "遅延コンパイル", "セキュリティ製品", "デバッグ"]
      }
    ];

    var CATEGORIES = [
      { id: "dev",    label: "開発・GitHub" },
      { id: "ai",     label: "AI・データ活用" },
      { id: "office", label: "Office・自動化" }
    ];

    var listEl = document.getElementById("list");
    var countEl = document.getElementById("count");
    var searchEl = document.getElementById("search");
    var categoryFilterEl = document.getElementById("category-filter");
    var activeCategory = "all";

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function getCategoryLabel(id) {
      var found = CATEGORIES.find(function (c) { return c.id === id; });
      return found ? found.label : id;
    }

    function getLevelClass(level) {
      return {
        "入門": "level-intro",
        "基礎": "level-basic",
        "応用": "level-advanced"
      }[level] || "level-basic";
    }

    function renderCategoryChips() {
      var chips = [{ id: "all", label: "すべて" }].concat(CATEGORIES);
      categoryFilterEl.innerHTML = chips.map(function (c) {
        return '<button class="category-chip" type="button" data-category="' + escapeHtml(c.id) + '" aria-pressed="' + (activeCategory === c.id ? "true" : "false") + '">' + escapeHtml(c.label) + '</button>';
      }).join("");
    }

    function render(query) {
      var q = (query || "").trim().toLowerCase();
      var matched = NOTES.filter(function (n) {
        var categoryMatch = activeCategory === "all" || n.category === activeCategory;
        if (!categoryMatch) return false;
        if (!q) return true;
        var hay = (n.title + " " + n.summary + " " + n.tags.join(" ") + " " + getCategoryLabel(n.category) + " " + n.level).toLowerCase();
        return q.split(/\s+/).every(function (term) { return hay.indexOf(term) !== -1; });
      });

      countEl.textContent = q
        ? matched.length + " 件ヒット（全 " + NOTES.length + " 件）"
        : matched.length + " 件表示（全 " + NOTES.length + " 件）";

      if (matched.length === 0) {
        var emptyLabel = q ? "「" + escapeHtml(query) + "」" : "選択中のカテゴリ";
        listEl.innerHTML = '<li class="empty">' + emptyLabel + 'に一致するノートはありませんでした。</li>';
        return;
      }

      listEl.innerHTML = matched.map(function (n) {
        var tags = n.tags.map(function (t) {
          return '<li class="tag">' + escapeHtml(t) + "</li>";
        }).join("");
        var categoryLabel = getCategoryLabel(n.category);
        return (
          '<li class="note-card">' +
            '<a class="note-link" href="' + encodeURI(n.href) + '">' +
              '<div class="note-meta">' +
                '<span class="note-date">' + escapeHtml(n.date) + "</span>" +
                '<span class="note-badge category-badge"><span class="category-dot" aria-hidden="true"></span>' + escapeHtml(categoryLabel) + "</span>" +
                '<span class="note-badge level-badge ' + getLevelClass(n.level) + '">' + escapeHtml(n.level) + "</span>" +
              "</div>" +
              "<h2>" + escapeHtml(n.title) + "</h2>" +
              "<p>" + escapeHtml(n.summary) + "</p>" +
              '<ul class="tag-row">' + tags + "</ul>" +
            "</a>" +
          "</li>"
        );
      }).join("");
    }

    searchEl.addEventListener("input", function () { render(searchEl.value); });
    categoryFilterEl.addEventListener("click", function (event) {
      var button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.getAttribute("data-category");
      renderCategoryChips();
      render(searchEl.value);
    });
    renderCategoryChips();
    render("");
  </script>
</body>
</html>
